<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#02050b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Outer Glow Grid -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad)" stroke-width="10" stroke-dasharray="12 18" stroke-linecap="round" opacity="0.85"/>
  <circle cx="256" cy="256" r="190" fill="#090d16" stroke="#111827" stroke-width="6"/>
  
  <!-- Crown Icon at the top -->
  <path d="M196 185 L226 220 L256 175 L286 220 L316 185 L306 245 L206 245 Z" fill="url(#grad)" />
  <circle cx="196" cy="180" r="5.5" fill="#f59e0b"/>
  <circle cx="256" cy="170" r="6.5" fill="#f59e0b"/>
  <circle cx="316" cy="180" r="5.5" fill="#f59e0b"/>
  
  <!-- Soccer Ball Path in lower center -->
  <g transform="translate(256, 315) scale(1.5)">
    <!-- Ball background and stroke -->
    <circle cx="0" cy="0" r="45" fill="#1e293b" stroke="url(#grad)" stroke-width="4.5"/>
    <!-- Pentagons / Lines configuration of a soccer ball -->
    <polygon points="0,-15 -14,-5 -9,12 9,12 14,-5" fill="#020617" stroke="url(#grad)" stroke-width="2.5"/>
    <line x1="0" y1="-15" x2="0" y2="-45" stroke="url(#grad)" stroke-width="3"/>
    <line x1="-14" y1="-5" x2="-38" y2="-24" stroke="url(#grad)" stroke-width="3"/>
    <line x1="-9" y1="12" x2="-26" y2="36" stroke="url(#grad)" stroke-width="3"/>
    <line x1="9" y1="12" x2="26" y2="36" stroke="url(#grad)" stroke-width="3"/>
    <line x1="14" y1="-5" x2="38" y2="-24" stroke="url(#grad)" stroke-width="3"/>
    
    <!-- Outer polygons to shape sections -->
    <polygon points="-38,-24 -24,-38 0,-45 -14,-29" fill="none" stroke="url(#grad)" stroke-width="2" />
    <polygon points="38,-24 24,-38 0,-45 14,-29" fill="none" stroke="url(#grad)" stroke-width="2" />
    <polygon points="-38,-24 -43,0 -31,23 -21,6" fill="none" stroke="url(#grad)" stroke-width="2" />
    <polygon points="38,-24 43,0 31,23 21,6" fill="none" stroke="url(#grad)" stroke-width="2" />
    <polygon points="-26,36 0,45 26,36 12,24 -12,24" fill="none" stroke="url(#grad)" stroke-width="2" />
  </g>
</svg>
